<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2026학년도 2학기 시간표 설계</title>
    <link rel="stylesheet" href="styles.css?v=20260702-01" />
  </head>
  <body class="planner-page">
    <div class="app-shell">
      <aside class="sidebar" aria-label="서비스 메뉴">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">T</span>
          <div>
            <strong>Timetable Hub</strong>
            <span>2학기 시간표 설계</span>
          </div>
        </div>

        <nav class="nav-list" aria-label="주요 화면">
          <a class="nav-item" href="index.html">
            <span aria-hidden="true">▦</span>
            운영 보드
          </a>
          <a class="nav-item active" href="planner.html">
            <span aria-hidden="true">▦</span>
            2학기 설계
          </a>
          <a class="nav-item" href="weekly.html">
            <span aria-hidden="true">▤</span>
            교사별 주간표
          </a>
        </nav>

        <div class="sync-box">
          <span class="pulse" aria-hidden="true"></span>
          <div>
            <strong>설계 저장</strong>
            <span id="syncStatus">이 브라우저에서 활성</span>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">2026학년도 2학기</p>
            <h1>시간표 설계</h1>
          </div>
        </header>

        <section class="planner-board" aria-labelledby="plannerTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Timetable Planner</p>
              <h2 id="plannerTitle">2학기 시간표 설계</h2>
            </div>
            <div class="planner-actions">
              <button class="ghost-button" id="plannerExportBtn" type="button">CSV 내보내기</button>
              <button class="ghost-button" id="plannerResetBtn" type="button">설계 초기화</button>
            </div>
          </div>

          <div class="planner-layout">
            <form id="plannerForm" class="planner-form">
              <label class="field">
                <span>교사</span>
                <select id="plannerTeacher" required></select>
              </label>
              <label class="field">
                <span>요일</span>
                <select id="plannerDay" required></select>
              </label>
              <label class="field">
                <span>교시</span>
                <select id="plannerPeriod" required></select>
              </label>
              <label class="field">
                <span>학반</span>
                <input id="plannerClass" type="text" placeholder="예: 1-3" required />
              </label>
              <label class="field">
                <span>교과목</span>
                <input id="plannerSubject" type="text" placeholder="예: 정보, 국어, 수학" required />
              </label>
              <label class="field">
                <span>수업명/비고</span>
                <input id="plannerLesson" type="text" placeholder="예: 프로그래밍, 진로, 동아리" />
              </label>
              <button class="primary-button" type="submit">배치 추가</button>
            </form>

            <div class="planner-summary" aria-label="2학기 설계 현황">
              <article>
                <span>배치 수</span>
                <strong id="plannerEntryCount">0</strong>
              </article>
              <article>
                <span>충돌</span>
                <strong id="plannerConflictCount">0</strong>
              </article>
            </div>
          </div>

          <div class="planner-table-wrap">
            <table class="planner-table" id="plannerTable">
              <caption>2학기 시간표 설계표</caption>
              <thead>
                <tr>
                  <th scope="col">교시</th>
                  <th scope="col">월</th>
                  <th scope="col">화</th>
                  <th scope="col">수</th>
                  <th scope="col">목</th>
                  <th scope="col">금</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="timetable-data.js?v=20260702-01"></script>
    <script src="planner.js?v=20260702-01"></script>
  </body>
</html>
